# ========= Terminal & Basic Settings =========
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Change prefix key to Ctrl+a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# General settings
set -g mouse on                    # Enable mouse support
set -g base-index 1                # Start window indexing at 1
setw -g pane-base-index 1          # Start pane indexing at 1
set -g renumber-windows on         # Renumber windows automatically
set -g history-limit 50000         # Increase scrollback history
set -s escape-time 0               # Faster command sequences
set -g display-time 4000           # Longer status messages
set -g status-interval 5           # Status bar update interval

# Allow tmux to pass modern terminal control sequences through to the outer terminal
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ========= Pane & Window Management =========
# Split keys: \ for vertical, - for horizontal
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Window switching
bind -r C-p previous-window
bind -r C-n next-window

# ========= Copy Mode =========
# prefix + [
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ========= Open pane content in external editor =========
# Press Prefix + z/v to capture entire pane history and open in Zed / neovim
bind-key z run-shell '
  if command -v zed >/dev/null 2>&1; then
    tmpfile=$(mktemp /tmp/tmux-buffer.XXXXXX)
    tmux capture-pane -S - -p > "$tmpfile"
    zed --wait "$tmpfile"
  fi
'
bind-key v run-shell '
  if command -v zed >/dev/null 2>&1; then
    tmpfile=$(mktemp /tmp/tmux-buffer.XXXXXX)
    tmux capture-pane -S - -p > "$tmpfile"
    tmux new-window "${EDITOR:-nvim} \"$tmpfile\""
  fi
'

# ========= Catppuccin Theme =========
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

# ========= Plugins (TPM) =========
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'

# Initialize TPM (must be at the bottom)
run '~/.tmux/plugins/tpm/tpm'
